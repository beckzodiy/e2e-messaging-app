services:
  - type: web
    name: e2e-messaging-backend
    env: python
    runtime: python-3.11
    buildCommand: |
      cd backend
      pip install --no-cache-dir -r requirements.txt
      python manage.py migrate
    startCommand: |
      cd backend
      gunicorn config.wsgi:application --bind 0.0.0.0:$PORT --workers 2 --timeout 60
    plan: free
    envVars:
      - key: DEBUG
        value: "False"
      - key: SECRET_KEY
        generateValue: true
      - key: ALLOWED_HOSTS
        value: "*.onrender.com,localhost,127.0.0.1"
      - key: DATABASE_URL
        fromDatabase:
          name: e2e-messaging-db
          property: connectionString

databases:
  - name: e2e-messaging-db
    plan: free
    ipWhitelist:
      - cidr: "0.0.0.0/0"
        description: "Allow all"
